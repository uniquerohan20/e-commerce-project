{% extends 'base/base.html' %}

{% block title %}Logged Out{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-body text-center">
                    <i class="fas fa-sign-out-alt fa-3x text-info mb-3"></i>
                    <h3>You have been logged out</h3>
                    <p class="text-muted">Thank you for visiting. You have been successfully logged out.</p>
                    
                    <div class="d-grid gap-2 d-md-flex justify-content-md-center">
                        <a href="{% url 'accounts:login' %}" class="btn btn-primary">
                            <i class="fas fa-sign-in-alt"></i> Login Again
                        </a>
                        <a href="{% url 'products:product_list' %}" class="btn btn-outline-primary">
                            <i class="fas fa-shopping-bag"></i> Continue Shopping
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
